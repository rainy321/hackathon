name: Keep Render Awake
# 每 10 分钟 ping 一次后端健康检查,防止 Render 免费版休眠(评委随时打开都秒响应)
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://growth-os-backend.onrender.com/api/health)
          echo "health status: $code"
          if [ "$code" != "200" ]; then echo "backend not ok ($code)"; exit 1; fi
